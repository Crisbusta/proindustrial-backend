services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: proindustrial
      POSTGRES_USER: proindustrial
      POSTGRES_PASSWORD: ${DB_PASSWORD:-devpassword}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proindustrial"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://proindustrial:${DB_PASSWORD:-devpassword}@db:5432/proindustrial?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me}
      PORT: 8080
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3001}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
